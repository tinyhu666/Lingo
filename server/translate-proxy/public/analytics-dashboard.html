<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lingo 数据看板</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4efe3;
        --surface: rgba(255, 255, 255, 0.78);
        --surface-strong: rgba(255, 255, 255, 0.9);
        --text: #1f2937;
        --muted: #6b7280;
        --line: rgba(15, 23, 42, 0.1);
        --accent: #db6a3c;
        --accent-soft: rgba(219, 106, 60, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(219, 106, 60, 0.16), transparent 34%),
          radial-gradient(circle at top right, rgba(26, 115, 232, 0.12), transparent 28%),
          linear-gradient(180deg, #faf7f0 0%, var(--bg) 100%);
      }

      main {
        max-width: 1160px;
        margin: 0 auto;
        padding: 40px 20px 60px;
      }

      .hero {
        display: flex;
        justify-content: space-between;
        gap: 20px;
        align-items: end;
        margin-bottom: 28px;
      }

      .hero h1 {
        margin: 0 0 10px;
        font-size: clamp(30px, 5vw, 48px);
      }

      .hero p {
        margin: 0;
        color: var(--muted);
        max-width: 720px;
        line-height: 1.6;
      }

      .hero-actions {
        display: flex;
        flex-direction: column;
        align-items: end;
        gap: 12px;
      }

      .hero .meta {
        color: var(--muted);
        font-size: 14px;
        text-align: right;
      }

      .language-switch {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--surface-strong);
        color: var(--muted);
        font-size: 14px;
      }

      .language-switch select {
        border: none;
        background: transparent;
        color: var(--text);
        font: inherit;
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
        gap: 16px;
        margin-bottom: 24px;
      }

      .card,
      .panel {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 22px;
        backdrop-filter: blur(18px);
        box-shadow: 0 14px 40px rgba(15, 23, 42, 0.06);
      }

      .card {
        padding: 18px 18px 20px;
      }

      .card .label {
        color: var(--muted);
        font-size: 13px;
        margin-bottom: 10px;
      }

      .card .value {
        font-size: 34px;
        font-weight: 700;
      }

      .card .hint {
        margin-top: 8px;
        color: var(--muted);
        font-size: 12px;
      }

      .panel {
        padding: 22px;
      }

      .panel h2 {
        margin: 0 0 6px;
        font-size: 20px;
      }

      .panel p {
        margin: 0 0 18px;
        color: var(--muted);
      }

      .toolbar {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }

      .toolbar label {
        color: var(--muted);
        font-size: 14px;
      }

      .toolbar input {
        border: 1px solid var(--line);
        background: var(--surface-strong);
        border-radius: 12px;
        padding: 10px 12px;
        font: inherit;
      }

      .toolbar button {
        border: none;
        background: var(--accent);
        color: white;
        border-radius: 999px;
        padding: 10px 18px;
        font: inherit;
        cursor: pointer;
      }

      .toolbar button:disabled {
        opacity: 0.65;
        cursor: progress;
      }

      .toolbar input:disabled {
        opacity: 0.72;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 12px 10px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        font-size: 14px;
      }

      th {
        color: var(--muted);
        font-weight: 600;
      }

      .bar {
        display: inline-flex;
        align-items: center;
        min-width: 160px;
        gap: 10px;
      }

      .bar-track {
        flex: 1;
        height: 8px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.08);
        overflow: hidden;
      }

      .bar-fill {
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--accent) 0%, #f1a56e 100%);
      }

      .status {
        margin-top: 14px;
        padding: 12px 14px;
        border-radius: 14px;
        background: var(--accent-soft);
        color: #7a3419;
        display: none;
      }

      .status.is-visible {
        display: block;
      }

      .empty-row td {
        text-align: center;
        color: var(--muted);
      }

      @media (max-width: 720px) {
        .hero {
          flex-direction: column;
          align-items: start;
        }

        .hero-actions {
          align-items: start;
        }

        .hero .meta {
          text-align: left;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <div>
          <h1 id="page-title">Lingo 数据看板</h1>
          <p id="hero-description">
            仅展示公开生命周期指标。看板按 Asia/Shanghai 聚合，服务端仍以 UTC 存储原始事件时间戳。
          </p>
        </div>
        <div class="hero-actions">
          <label class="language-switch">
            <span id="language-label">语言</span>
            <select id="language-select" aria-label="Language">
              <option value="zh-CN">简体中文</option>
              <option value="en">English</option>
            </select>
          </label>
          <div class="meta" id="generated-at">加载中...</div>
        </div>
      </section>

      <section class="cards" id="summary-cards"></section>

      <section class="panel">
        <h2 id="daily-title">每日指标</h2>
        <p id="daily-description">
          默认展示最近 30 天。疑似卸载表示该安装实例已连续 30 天没有发送活跃 ping。
        </p>
        <div class="toolbar">
          <label><span id="from-label">开始日期</span> <input type="date" id="from-date" /></label>
          <label><span id="to-label">结束日期</span> <input type="date" id="to-date" /></label>
          <button id="refresh-button" type="button">刷新</button>
        </div>
        <div id="status" class="status" role="status"></div>
        <div style="overflow-x:auto">
          <table>
            <thead>
              <tr>
                <th id="th-date">日期</th>
                <th id="th-dau">日活</th>
                <th id="th-launches">启动</th>
                <th id="th-installs">安装</th>
                <th id="th-suspected-uninstalls">疑似卸载</th>
              </tr>
            </thead>
            <tbody id="daily-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script>
      const cardsNode = document.getElementById('summary-cards');
      const dailyBodyNode = document.getElementById('daily-body');
      const generatedAtNode = document.getElementById('generated-at');
      const statusNode = document.getElementById('status');
      const fromDateInput = document.getElementById('from-date');
      const toDateInput = document.getElementById('to-date');
      const refreshButton = document.getElementById('refresh-button');
      const pageTitleNode = document.getElementById('page-title');
      const heroDescriptionNode = document.getElementById('hero-description');
      const languageLabelNode = document.getElementById('language-label');
      const languageSelect = document.getElementById('language-select');
      const dailyTitleNode = document.getElementById('daily-title');
      const dailyDescriptionNode = document.getElementById('daily-description');
      const fromLabelNode = document.getElementById('from-label');
      const toLabelNode = document.getElementById('to-label');
      const thDateNode = document.getElementById('th-date');
      const thDauNode = document.getElementById('th-dau');
      const thLaunchesNode = document.getElementById('th-launches');
      const thInstallsNode = document.getElementById('th-installs');
      const thSuspectedUninstallsNode = document.getElementById('th-suspected-uninstalls');

      const defaultLanguage = 'zh-CN';
      const languageStorageKey = 'lingo.analytics.dashboard.language';
      const hasLanguage = (value) => Object.prototype.hasOwnProperty.call(translations, value);

      const translations = {
        'zh-CN': {
          pageTitle: 'Lingo 数据看板',
          heroDescription: '仅展示公开生命周期指标。看板按 Asia/Shanghai 聚合，服务端仍以 UTC 存储原始事件时间戳。',
          languageLabel: '语言',
          languageAriaLabel: '语言',
          generatedAtLoading: '加载中...',
          generatedAtUpdated: '更新时间',
          generatedAtTimezone: '时区',
          noData: '暂无数据',
          loadingStatus: '正在加载最新数据...',
          refreshing: '刷新中...',
          requestFailed: '请求失败（HTTP {status}）',
          networkError: '网络连接失败，请稍后重试。',
          unexpectedError: '发生未知错误。',
          unexpectedErrorWithDetail: '发生未知错误：{detail}',
          dailyTitle: '每日指标',
          dailyDescription: '默认展示最近 30 天。疑似卸载表示该安装实例已连续 30 天没有发送活跃 ping。',
          fromLabel: '开始日期',
          toLabel: '结束日期',
          refresh: '刷新',
          date: '日期',
          dau: '日活',
          launches: '启动',
          installs: '安装',
          suspectedUninstalls: '疑似卸载',
          cardDauTodayLabel: '今日日活',
          cardDauTodayHint: '今天至少有一次活跃 ping 的唯一安装实例数',
          cardLaunchesTodayLabel: '今日启动',
          cardLaunchesTodayHint: '今天记录到的桌面端启动总次数',
          cardInstallsTodayLabel: '今日安装',
          cardInstallsTodayHint: '今天首次上报的安装实例数',
          cardSuspectedUninstallsLabel: '疑似卸载',
          cardSuspectedUninstallsHint: '至少 30 天未活跃的安装实例数',
          cardInstallationsTotalLabel: '累计安装',
          cardInstallationsTotalHint: '服务端观察到的累计安装实例总数',
          cardActive30dLabel: '近 30 天活跃',
          cardActive30dHint: '近 30 天内至少活跃过一次的安装实例数',
        },
        en: {
          pageTitle: 'Lingo Analytics',
          heroDescription: 'Public lifecycle metrics only. The dashboard groups by Asia/Shanghai while raw event timestamps stay stored in UTC on the server.',
          languageLabel: 'Language',
          languageAriaLabel: 'Language',
          generatedAtLoading: 'Loading...',
          generatedAtUpdated: 'Updated',
          generatedAtTimezone: 'Timezone',
          noData: 'No data',
          loadingStatus: 'Loading latest metrics...',
          refreshing: 'Refreshing...',
          requestFailed: 'Request failed (HTTP {status})',
          networkError: 'Network request failed. Please try again later.',
          unexpectedError: 'Unexpected error.',
          unexpectedErrorWithDetail: 'Unexpected error: {detail}',
          dailyTitle: 'Daily Metrics',
          dailyDescription: 'Default range is the last 30 days. Suspected uninstall means the installation has not sent any active ping for 30 days.',
          fromLabel: 'From',
          toLabel: 'To',
          refresh: 'Refresh',
          date: 'Date',
          dau: 'DAU',
          launches: 'Launches',
          installs: 'Installs',
          suspectedUninstalls: 'Suspected Uninstalls',
          cardDauTodayLabel: 'DAU Today',
          cardDauTodayHint: 'Unique installations with at least one active ping today',
          cardLaunchesTodayLabel: 'Launches Today',
          cardLaunchesTodayHint: 'Total desktop launches recorded today',
          cardInstallsTodayLabel: 'Installs Today',
          cardInstallsTodayHint: 'First-time install reports recorded today',
          cardSuspectedUninstallsLabel: 'Suspected Uninstalls',
          cardSuspectedUninstallsHint: 'Installations inactive for at least 30 days',
          cardInstallationsTotalLabel: 'Installations Total',
          cardInstallationsTotalHint: 'Cumulative installations ever seen by the server',
          cardActive30dLabel: 'Active 30d',
          cardActive30dHint: 'Installations active at least once in the last 30 days',
        },
      };

      const metricCards = [
        {
          key: 'dau_today',
          labelKey: 'cardDauTodayLabel',
          hintKey: 'cardDauTodayHint',
        },
        {
          key: 'launches_today',
          labelKey: 'cardLaunchesTodayLabel',
          hintKey: 'cardLaunchesTodayHint',
        },
        {
          key: 'installs_today',
          labelKey: 'cardInstallsTodayLabel',
          hintKey: 'cardInstallsTodayHint',
        },
        {
          key: 'suspected_uninstalls_current',
          labelKey: 'cardSuspectedUninstallsLabel',
          hintKey: 'cardSuspectedUninstallsHint',
        },
        {
          key: 'installations_total',
          labelKey: 'cardInstallationsTotalLabel',
          hintKey: 'cardInstallationsTotalHint',
        },
        {
          key: 'active_installations_30d',
          labelKey: 'cardActive30dLabel',
          hintKey: 'cardActive30dHint',
        },
      ];

      const readStoredLanguage = () => {
        try {
          const stored = window.localStorage.getItem(languageStorageKey);
          return hasLanguage(stored) ? stored : defaultLanguage;
        } catch {
          return defaultLanguage;
        }
      };

      let currentLanguage = readStoredLanguage();
      let currentOverview = null;
      let currentDaily = null;
      let currentStatusState = null;
      let isLoading = false;

      const t = (key, params = {}) => {
        const template = translations[currentLanguage]?.[key] || translations[defaultLanguage][key] || key;
        return String(template).replace(/\{(\w+)\}/g, (_, token) => String(params[token] ?? ''));
      };

      const saveLanguage = (value) => {
        try {
          window.localStorage.setItem(languageStorageKey, value);
        } catch {
          // Ignore browsers that block storage for public pages.
        }
      };

      const formatNumber = (value) =>
        Number(value || 0).toLocaleString(currentLanguage === 'zh-CN' ? 'zh-CN' : 'en-US');

      const setStatus = (state) => {
        currentStatusState = state || null;
        const message =
          !currentStatusState
            ? ''
            : typeof currentStatusState === 'string'
              ? currentStatusState
              : t(currentStatusState.key, currentStatusState.params);

        statusNode.textContent = message;
        statusNode.classList.toggle('is-visible', Boolean(message));
      };

      const setLoadingState = (value) => {
        isLoading = Boolean(value);
        refreshButton.disabled = isLoading;
        fromDateInput.disabled = isLoading;
        toDateInput.disabled = isLoading;
        refreshButton.textContent = t(isLoading ? 'refreshing' : 'refresh');
      };

      const formatTimestamp = (value) => {
        if (!value) {
          return t('noData');
        }

        const parsed = new Date(value);
        if (Number.isNaN(parsed.getTime())) {
          return value;
        }

        return parsed.toLocaleString(currentLanguage === 'zh-CN' ? 'zh-CN' : 'en-US', {
          hour12: false,
          timeZone: 'Asia/Shanghai',
        });
      };

      const renderGeneratedAt = () => {
        if (!currentOverview) {
          generatedAtNode.textContent = t('generatedAtLoading');
          return;
        }

        generatedAtNode.textContent =
          `${t('generatedAtUpdated')} ${formatTimestamp(currentOverview.generated_at)}` +
          ` | ${t('generatedAtTimezone')} ${currentOverview.timezone || 'Asia/Shanghai'}`;
      };

      const renderCards = (metrics) => {
        cardsNode.innerHTML = metricCards
          .map(
            (item) => `
              <article class="card">
                <div class="label">${t(item.labelKey)}</div>
                <div class="value">${formatNumber(metrics[item.key])}</div>
                <div class="hint">${t(item.hintKey)}</div>
              </article>
            `,
          )
          .join('');
      };

      const renderDaily = (days) => {
        if (!days.length) {
          dailyBodyNode.innerHTML = `
            <tr class="empty-row">
              <td colspan="5">${t('noData')}</td>
            </tr>
          `;
          return;
        }

        const maxDau = Math.max(1, ...days.map((item) => Number(item.dau || 0)));
        dailyBodyNode.innerHTML = days
          .map(
            (item) => `
              <tr>
                <td>${item.date}</td>
                <td>
                  <div class="bar">
                    <div class="bar-track">
                      <div class="bar-fill" style="width:${Math.round((Number(item.dau || 0) / maxDau) * 100)}%"></div>
                    </div>
                    <span>${formatNumber(item.dau)}</span>
                  </div>
                </td>
                <td>${formatNumber(item.launches)}</td>
                <td>${formatNumber(item.installs)}</td>
                <td>${formatNumber(item.suspected_uninstalls)}</td>
              </tr>
            `,
          )
          .join('');
      };

      const applyTranslations = () => {
        document.documentElement.lang = currentLanguage;
        document.title = t('pageTitle');
        pageTitleNode.textContent = t('pageTitle');
        heroDescriptionNode.textContent = t('heroDescription');
        languageLabelNode.textContent = t('languageLabel');
        languageSelect.setAttribute('aria-label', t('languageAriaLabel'));
        dailyTitleNode.textContent = t('dailyTitle');
        dailyDescriptionNode.textContent = t('dailyDescription');
        fromLabelNode.textContent = t('fromLabel');
        toLabelNode.textContent = t('toLabel');
        refreshButton.textContent = t('refresh');
        thDateNode.textContent = t('date');
        thDauNode.textContent = t('dau');
        thLaunchesNode.textContent = t('launches');
        thInstallsNode.textContent = t('installs');
        thSuspectedUninstallsNode.textContent = t('suspectedUninstalls');
        setLoadingState(isLoading);
        setStatus(currentStatusState);
        renderGeneratedAt();
        renderCards(currentOverview?.metrics || {});
        renderDaily(currentDaily?.days || []);
      };

      const createHttpError = (status, detail) => {
        const error = new Error(detail || `Request failed: ${status}`);
        error.status = status;
        error.detail = detail || '';
        return error;
      };

      const toStatusState = (error) => {
        if (error && typeof error.status === 'number') {
          return { key: 'requestFailed', params: { status: error.status } };
        }

        const message = String(error?.message || '').trim();
        if (/failed to fetch|fetch failed|networkerror|network request failed/i.test(message)) {
          return { key: 'networkError' };
        }

        if (message) {
          return { key: 'unexpectedErrorWithDetail', params: { detail: message } };
        }

        return { key: 'unexpectedError' };
      };

      const fetchJson = async (url) => {
        let response;

        try {
          response = await fetch(url, { cache: 'no-store' });
        } catch (error) {
          const wrapped = new Error(error?.message || 'fetch failed');
          wrapped.code = 'NETWORK_ERROR';
          throw wrapped;
        }

        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw createHttpError(response.status, payload.message);
        }
        return payload;
      };

      const loadData = async () => {
        setLoadingState(true);
        setStatus({ key: 'loadingStatus' });
        const from = fromDateInput.value;
        const to = toDateInput.value;
        const query = new URLSearchParams();

        if (from) {
          query.set('from', from);
        }

        if (to) {
          query.set('to', to);
        }

        const [overview, daily] = await Promise.all([
          fetchJson('/analytics/public/overview'),
          fetchJson(`/analytics/public/daily?${query.toString()}`),
        ]);

        currentOverview = overview;
        currentDaily = daily;
        renderGeneratedAt();
        renderCards(overview.metrics || {});
        renderDaily(daily.days || []);

        if (!fromDateInput.value) {
          fromDateInput.value = daily.from || '';
        }

        if (!toDateInput.value) {
          toDateInput.value = daily.to || '';
        }

        setStatus(null);
        setLoadingState(false);
      };

      languageSelect.value = currentLanguage;
      applyTranslations();

      languageSelect.addEventListener('change', (event) => {
        const nextLanguage = event.target.value;
        currentLanguage = hasLanguage(nextLanguage) ? nextLanguage : defaultLanguage;
        saveLanguage(currentLanguage);
        applyTranslations();
      });

      refreshButton.addEventListener('click', () => {
        void loadData().catch((error) => {
          setStatus(toStatusState(error));
          setLoadingState(false);
        });
      });

      void loadData().catch((error) => {
        setStatus(toStatusState(error));
        setLoadingState(false);
      });
    </script>
  </body>
</html>
