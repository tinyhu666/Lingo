services:
  translate-proxy:
    build:
      context: .
    container_name: lingo-translate-proxy
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    expose:
      - "8787"

  caddy:
    image: caddy:2
    container_name: lingo-translate-proxy-caddy
    restart: unless-stopped
    depends_on:
      - translate-proxy
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
