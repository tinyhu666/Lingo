name: Client CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: client-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-safety:
    name: Repository Safety
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'

      - name: Reject Tracked Updater Private Keys
        shell: bash
        run: |
          set -euo pipefail
          tracked_keys="$(git ls-files '.github/updater/*.key')"
          if [ -n "$tracked_keys" ]; then
            echo "Updater private keys must be stored in GitHub Secrets, not in the repository."
            echo "$tracked_keys"
            exit 1
          fi

      - name: Verify Release Configuration
        run: npm run verify:release-config

  client:
    name: Client (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
          - os: macos-latest
            label: macOS

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install Dependencies
        run: npm ci

      - name: Verify Release Configuration
        run: npm run verify:release-config

      - name: Check Rust Formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Build Frontend
        run: npm run build

      - name: Test Frontend Utilities
        run: npm run test:client

      - name: Lint Rust
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Test Rust
        run: cargo test --manifest-path src-tauri/Cargo.toml

  proxy:
    name: Translation Proxy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'
          cache: npm
          cache-dependency-path: server/translate-proxy/package-lock.json

      - name: Install Dependencies
        run: npm ci --prefix server/translate-proxy

      - name: Test Translation Proxy
        run: npm run proxy:smoke

      - name: Test Analytics Proxy
        run: npm run proxy:analytics-smoke
