name: Build Installers

on:
  workflow_dispatch:
  push:
    branches:
      - release
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: '--bundles msi,nsis'
            label: Windows
          - os: macos-latest
            args: '--bundles app,dmg'
            label: macOS

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Dependencies
        run: npm ci

      - name: Install WiX Toolset (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install wixtoolset -y --no-progress
          choco install nsis -y --no-progress
          $wix = Get-ChildItem 'C:\Program Files (x86)' -Directory | Where-Object { $_.Name -like 'WiX Toolset*' } | Select-Object -First 1
          if ($null -eq $wix) {
            throw "WiX Toolset installation not found."
          }
          "$($wix.FullName)\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          candle.exe -?

      - name: Build And Publish Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: "autogg-v013-updater"
        with:
          tagName: v__VERSION__
          releaseName: 'AutoGG v__VERSION__'
          releaseBody: |
            更新日志：
            1. 完成全客户端逐页视觉验收并修复 UI 显示异常。
            2. 统一标题、正文与辅助文案层级，优化页面对齐与可读性。
            3. 修复首页关键控件底部对齐与交互显示细节。
            4. 重做并全量替换主流工具风 icon。

            安装包：
            - Windows: `.msi` / `.exe`
            - macOS: `.dmg`
            - 自动更新：`latest.json` + 签名包
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
