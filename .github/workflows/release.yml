name: Build Installers

on:
  workflow_dispatch:
  push:
    branches:
      - release
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: '--bundles msi,nsis'
            label: Windows
          - os: macos-latest
            args: '--bundles app,dmg'
            label: macOS

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Dependencies
        run: npm ci

      - name: Install WiX Toolset (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install wixtoolset -y --no-progress
          choco install nsis -y --no-progress
          $wix = Get-ChildItem 'C:\Program Files (x86)' -Directory | Where-Object { $_.Name -like 'WiX Toolset*' } | Select-Object -First 1
          if ($null -eq $wix) {
            throw "WiX Toolset installation not found."
          }
          "$($wix.FullName)\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          candle.exe -?

      - name: Build And Publish Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'Lingo v__VERSION__'
          releaseBody: |
            更新日志：
            1. 接通服务端翻译链路，恢复真实翻译能力。
            2. 统一首页设置区域尺寸与按钮高度，优化界面对齐与状态反馈。
            3. 精简翻译语言控件层级，修复首页设置区视觉冗余。
            4. 修复已知问题，提升整体稳定性与使用流畅度。

            安装包：
            - Windows: `.msi` / `.exe`
            - macOS: `.dmg`
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
