name: Build Installers

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to mirror to Tencent COS
        required: true
        default: v0.6.8
  push:
    tags:
      - 'v*'

jobs:
  build:
    if: github.event_name != 'workflow_dispatch'
    permissions:
      contents: write
      id-token: write
    env:
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: '--bundles msi,nsis'
            label: Windows
          - os: macos-latest
            args: '--bundles app,dmg'
            label: macOS

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Dependencies
        run: npm ci

      - name: Prepare Release Notes
        id: release_notes
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"
          echo "Using changelog section for version: $VERSION"
          node ./scripts/get-release-notes.mjs "$VERSION"

      - name: Install WiX Toolset (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install wixtoolset -y --no-progress
          choco install nsis -y --no-progress
          $wix = Get-ChildItem 'C:\Program Files (x86)' -Directory | Where-Object { $_.Name -like 'WiX Toolset*' } | Select-Object -First 1
          if ($null -eq $wix) {
            throw "WiX Toolset installation not found."
          }
          "$($wix.FullName)\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          candle.exe -?

      - name: Resolve Windows Signing Strategy
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          AZURE_ARTIFACT_SIGNING_ENDPOINT: ${{ vars.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME: ${{ vars.AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME }}
          AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ vars.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME }}
        run: |
          $artifactSigningConfigured =
            -not [string]::IsNullOrWhiteSpace($env:AZURE_CLIENT_ID) -and
            -not [string]::IsNullOrWhiteSpace($env:AZURE_TENANT_ID) -and
            -not [string]::IsNullOrWhiteSpace($env:AZURE_SUBSCRIPTION_ID) -and
            -not [string]::IsNullOrWhiteSpace($env:AZURE_ARTIFACT_SIGNING_ENDPOINT) -and
            -not [string]::IsNullOrWhiteSpace($env:AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME) -and
            -not [string]::IsNullOrWhiteSpace($env:AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME)

          $pfxConfigured =
            -not [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE) -and
            -not [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)

          if ($artifactSigningConfigured) {
            "WINDOWS_SIGNING_MODE=artifact" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            Write-Host "Using Azure Artifact Signing for Windows release artifacts."
            exit 0
          }

          if ($pfxConfigured) {
            "WINDOWS_SIGNING_MODE=pfx" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            Write-Host "Using local PFX-based Authenticode signing for Windows release artifacts."
            exit 0
          }

          "WINDOWS_SIGNING_MODE=none" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Warning "No Windows signing configuration was found. Release builds will continue without Authenticode signing, and Windows may show trust warnings."

      - name: Import Windows Code Signing Certificate
        if: matrix.os == 'windows-latest' && !(env.AZURE_CLIENT_ID != '' && env.AZURE_TENANT_ID != '' && env.AZURE_SUBSCRIPTION_ID != '' && vars.AZURE_ARTIFACT_SIGNING_ENDPOINT != '' && vars.AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME != '' && vars.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME != '') && env.WINDOWS_CERTIFICATE != '' && env.WINDOWS_CERTIFICATE_PASSWORD != ''
        shell: pwsh
        run: |
          $certDir = Join-Path $PWD ".github/windows-signing"
          New-Item -ItemType Directory -Path $certDir -Force | Out-Null

          $encodedPath = Join-Path $certDir "certificate.txt"
          $pfxPath = Join-Path $certDir "certificate.pfx"

          Set-Content -Path $encodedPath -Value ($env:WINDOWS_CERTIFICATE -replace '\s', '') -NoNewline
          certutil -decode $encodedPath $pfxPath | Out-Null

          $securePassword = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $importedCertificates = @(Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $securePassword)
          $signingCertificate = $importedCertificates |
            Where-Object { $_.HasPrivateKey } |
            Select-Object -First 1

          if (-not $signingCertificate) {
            throw "The imported PFX does not contain a private key."
          }

          "WINDOWS_CERTIFICATE_THUMBPRINT=$($signingCertificate.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "WINDOWS_TIMESTAMP_URL=https://timestamp.digicert.com" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Setup .NET 8 Runtime For Artifact Signing
        if: matrix.os == 'windows-latest' && env.AZURE_CLIENT_ID != '' && env.AZURE_TENANT_ID != '' && env.AZURE_SUBSCRIPTION_ID != '' && vars.AZURE_ARTIFACT_SIGNING_ENDPOINT != '' && vars.AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME != '' && vars.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME != ''
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Azure Login For Artifact Signing
        if: matrix.os == 'windows-latest' && env.AZURE_CLIENT_ID != '' && env.AZURE_TENANT_ID != '' && env.AZURE_SUBSCRIPTION_ID != '' && vars.AZURE_ARTIFACT_SIGNING_ENDPOINT != '' && vars.AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME != '' && vars.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME != ''
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Prepare Artifact Signing SignTool Integration
        if: matrix.os == 'windows-latest' && env.AZURE_CLIENT_ID != '' && env.AZURE_TENANT_ID != '' && env.AZURE_SUBSCRIPTION_ID != '' && vars.AZURE_ARTIFACT_SIGNING_ENDPOINT != '' && vars.AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME != '' && vars.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME != ''
        shell: pwsh
        env:
          AZURE_ARTIFACT_SIGNING_ENDPOINT: ${{ vars.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME: ${{ vars.AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME }}
          AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ vars.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME }}
        run: |
          $artifactDir = Join-Path $PWD ".github/windows-signing/artifact-signing"
          New-Item -ItemType Directory -Path $artifactDir -Force | Out-Null

          $nugetPath = Join-Path $artifactDir "nuget.exe"
          Invoke-WebRequest -Uri "https://dist.nuget.org/win-x86-commandline/latest/nuget.exe" -OutFile $nugetPath

          $packagesDir = Join-Path $artifactDir "packages"
          & $nugetPath install Microsoft.ArtifactSigning.Client -x -OutputDirectory $packagesDir | Out-Host

          $dlib = Get-ChildItem -Path $packagesDir -Recurse -Filter "Azure.CodeSigning.Dlib.dll" |
            Sort-Object FullName -Descending |
            Select-Object -First 1

          if (-not $dlib) {
            throw "Azure.CodeSigning.Dlib.dll was not found after installing Microsoft.ArtifactSigning.Client."
          }

          $metadataPath = Join-Path $artifactDir "metadata.json"
          $metadata = [ordered]@{
            Endpoint = $env:AZURE_ARTIFACT_SIGNING_ENDPOINT
            CodeSigningAccountName = $env:AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME
            CertificateProfileName = $env:AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME
            CorrelationId = "$env:GITHUB_RUN_ID-$env:GITHUB_RUN_ATTEMPT"
          } | ConvertTo-Json

          Set-Content -Path $metadataPath -Value $metadata -Encoding utf8

          "ARTIFACT_SIGNING_DLIB_PATH=$($dlib.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "ARTIFACT_SIGNING_METADATA_PATH=$metadataPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "WINDOWS_TIMESTAMP_URL=http://timestamp.acs.microsoft.com" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Load And Normalize Updater Signing Key
        shell: bash
        env:
          RAW_UPDATER_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          RAW_UPDATER_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          REPO_KEY_FILE=".github/updater/updater.key"
          SIGNING_KEY="${RAW_UPDATER_KEY:-}"
          SIGNING_PASSWORD="${RAW_UPDATER_PASSWORD:-}"

          # Keep updater key stable so historical clients can verify new signatures.
          if [ -f "$REPO_KEY_FILE" ]; then
            REPO_KEY="$(tr -d '\r\n' < "$REPO_KEY_FILE")"
            if [ -n "$REPO_KEY" ]; then
              SIGNING_KEY="$REPO_KEY"
              SIGNING_PASSWORD="autogg-v013-updater"
              echo "Using updater signing key from repository key file."
            fi
          fi

          if [ -z "${SIGNING_KEY:-}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY secret is empty."
            exit 1
          fi

          if [ -z "${SIGNING_PASSWORD:-}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD secret is empty."
            exit 1
          fi

          decode_base64() {
            local value="$1"
            local decoded=""
            if decoded="$(printf '%s' "$value" | base64 --decode 2>/dev/null)"; then
              printf '%s' "$decoded"
              return 0
            fi
            if decoded="$(printf '%s' "$value" | base64 -d 2>/dev/null)"; then
              printf '%s' "$decoded"
              return 0
            fi
            if decoded="$(printf '%s' "$value" | base64 -D 2>/dev/null)"; then
              printf '%s' "$decoded"
              return 0
            fi
            return 1
          }

          # Normalize CR and support secrets stored with literal "\n".
          NORMALIZED_KEY_RAW="${SIGNING_KEY//$'\r'/}"
          NORMALIZED_KEY_RAW="${NORMALIZED_KEY_RAW//\\n/$'\n'}"

          # Tauri expects the updater private key env in base64 form.
          if printf '%s\n' "$NORMALIZED_KEY_RAW" | grep -q '^untrusted comment:'; then
            NORMALIZED_KEY_B64="$(printf '%s' "$NORMALIZED_KEY_RAW" | base64 | tr -d '\n\r')"
          else
            CANDIDATE_B64="$(printf '%s' "$NORMALIZED_KEY_RAW" | tr -d '\n\r\t ')"
            DECODED_KEY="$(decode_base64 "$CANDIDATE_B64" || true)"
            if ! printf '%s\n' "$DECODED_KEY" | grep -q '^untrusted comment:'; then
              echo "TAURI_SIGNING_PRIVATE_KEY format is invalid (must be minisign key text or its base64 encoding)."
              exit 1
            fi
            NORMALIZED_KEY_B64="$CANDIDATE_B64"
          fi

          # Trim CR from password to avoid accidental Windows line endings in secrets.
          NORMALIZED_PASSWORD="${SIGNING_PASSWORD//$'\r'/}"

          {
            echo "TAURI_SIGNING_PRIVATE_KEY=$NORMALIZED_KEY_B64"
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=$NORMALIZED_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Resolve Translation Backend Defaults
        shell: bash
        env:
          CONFIGURED_BACKEND_URL: ${{ vars.LINGO_BACKEND_URL }}
          SUPABASE_PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID }}
          CONFIGURED_BACKEND_ANON_KEY_SECRET: ${{ secrets.LINGO_BACKEND_ANON_KEY }}
          CONFIGURED_BACKEND_ANON_KEY_VAR: ${{ vars.LINGO_BACKEND_ANON_KEY }}
        run: |
          set -euo pipefail

          BACKEND_URL="${CONFIGURED_BACKEND_URL:-}"
          if [ -z "$BACKEND_URL" ] && [ -n "${SUPABASE_PROJECT_ID:-}" ]; then
            BACKEND_URL="https://${SUPABASE_PROJECT_ID}.supabase.co/functions/v1"
          fi

          BACKEND_ANON_KEY="${CONFIGURED_BACKEND_ANON_KEY_SECRET:-}"
          if [ -z "$BACKEND_ANON_KEY" ]; then
            BACKEND_ANON_KEY="${CONFIGURED_BACKEND_ANON_KEY_VAR:-}"
          fi

          echo "LINGO_BACKEND_URL=$BACKEND_URL" >> "$GITHUB_ENV"
          echo "LINGO_BACKEND_ANON_KEY=$BACKEND_ANON_KEY" >> "$GITHUB_ENV"

          if [ -n "$BACKEND_URL" ]; then
            echo "Using embedded translation backend: $BACKEND_URL"
          else
            echo "Translation backend default is not configured; release builds will require runtime environment variables."
          fi

      - name: Build And Publish Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Lingo v__VERSION__'
          releaseBody: ${{ steps.release_notes.outputs.body }}
          generateReleaseNotes: false
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

      - name: Create Windows Portable ZIP
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $version = node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version"
          $portableDir = Join-Path "src-tauri/target/release/bundle" "portable"
          New-Item -ItemType Directory -Path $portableDir -Force | Out-Null

          $binaryPath = Join-Path "src-tauri/target/release" "Lingo.exe"
          if (-not (Test-Path -LiteralPath $binaryPath)) {
            throw "Portable binary was not produced at $binaryPath"
          }

          $zipPath = Join-Path $portableDir ("Lingo_{0}_x64-portable.zip" -f $version)
          if (Test-Path -LiteralPath $zipPath) {
            Remove-Item -LiteralPath $zipPath -Force
          }

          Compress-Archive -Path $binaryPath -DestinationPath $zipPath
          "WINDOWS_PORTABLE_ZIP_PATH=$((Resolve-Path -LiteralPath $zipPath).Path)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload Windows Portable ZIP
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if (-not (Test-Path -LiteralPath $env:WINDOWS_PORTABLE_ZIP_PATH)) {
            throw "Portable ZIP was not found at $env:WINDOWS_PORTABLE_ZIP_PATH"
          }

          gh release upload $env:GITHUB_REF_NAME $env:WINDOWS_PORTABLE_ZIP_PATH --clobber --repo $env:GITHUB_REPOSITORY

      - name: Verify Windows Installer Signatures
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $installers = Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse -Include *.exe,*.msi
          if (-not $installers) {
            throw "No Windows installer artifacts were produced."
          }

          if ($env:WINDOWS_SIGNING_MODE -eq "none") {
            Write-Warning "Windows release artifacts were generated without Authenticode signing."
            foreach ($installer in $installers) {
              $signature = Get-AuthenticodeSignature $installer.FullName
              Write-Host "$($installer.Name): $($signature.Status)"
            }
            exit 0
          }

          foreach ($installer in $installers) {
            $signature = Get-AuthenticodeSignature $installer.FullName
            if ($signature.Status -ne "Valid") {
              $signature | Format-List *
              throw "Installer is not Authenticode-signed: $($installer.FullName)"
            }
          }

  mirror_to_cos:
    name: Mirror Release To Tencent COS
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: cos-mirror-${{ github.ref_name }}
      cancel-in-progress: true
    permissions:
      contents: write
    env:
      RELEASE_REPO: tinyhu666/Lingo
      RELEASE_TAG: ${{ github.ref_name }}
      TENCENT_COS_BUCKET: lingo-1259551686
      TENCENT_COS_REGION: ap-shanghai
      TENCENT_COS_PUBLIC_BASE_URL: https://lingo-1259551686.cos.ap-shanghai.myqcloud.com
      COS_PREP_DIR: .mirror-cos
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'

      - name: Install Tencent COS SDK
        run: npm install --no-save cos-nodejs-sdk-v5

      - name: Prepare Mirrored Release Payload
        id: prepare_mirror
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node ./scripts/prepare-cos-release.mjs

      - name: Upload Mirrored Release To COS
        env:
          TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
          TENCENT_COS_SESSION_TOKEN: ${{ secrets.TENCENT_COS_SESSION_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: node ./scripts/upload-cos-release.mjs

      - name: Rewrite GitHub latest.json To Tencent COS URLs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$RELEASE_TAG" .mirror-cos/releases/latest.json --clobber

  mirror_existing_release:
    name: Mirror Existing Release To Tencent COS
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: cos-mirror-${{ inputs.release_tag }}
      cancel-in-progress: true
    permissions:
      contents: write
    env:
      RELEASE_REPO: tinyhu666/Lingo
      RELEASE_TAG: ${{ inputs.release_tag }}
      TENCENT_COS_BUCKET: lingo-1259551686
      TENCENT_COS_REGION: ap-shanghai
      TENCENT_COS_PUBLIC_BASE_URL: https://lingo-1259551686.cos.ap-shanghai.myqcloud.com
      COS_PREP_DIR: .mirror-cos
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'

      - name: Install Tencent COS SDK
        run: npm install --no-save cos-nodejs-sdk-v5

      - name: Prepare Mirrored Release Payload
        id: prepare_mirror
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node ./scripts/prepare-cos-release.mjs

      - name: Upload Mirrored Release To COS
        env:
          TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
          TENCENT_COS_SESSION_TOKEN: ${{ secrets.TENCENT_COS_SESSION_TOKEN }}
        run: node ./scripts/upload-cos-release.mjs

      - name: Rewrite GitHub latest.json To Tencent COS URLs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$RELEASE_TAG" .mirror-cos/releases/latest.json --clobber
