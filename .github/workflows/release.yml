name: Build Installers

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: '--bundles msi,nsis'
            label: Windows
          - os: macos-latest
            args: '--bundles app,dmg'
            label: macOS

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Dependencies
        run: npm ci

      - name: Install WiX Toolset (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install wixtoolset -y --no-progress
          choco install nsis -y --no-progress
          $wix = Get-ChildItem 'C:\Program Files (x86)' -Directory | Where-Object { $_.Name -like 'WiX Toolset*' } | Select-Object -First 1
          if ($null -eq $wix) {
            throw "WiX Toolset installation not found."
          }
          "$($wix.FullName)\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          candle.exe -?

      - name: Normalize Updater Signing Secrets
        shell: bash
        env:
          RAW_UPDATER_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          RAW_UPDATER_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${RAW_UPDATER_KEY:-}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY secret is empty."
            exit 1
          fi

          if [ -z "${RAW_UPDATER_PASSWORD:-}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD secret is empty."
            exit 1
          fi

          # Support secrets stored with literal "\n" characters.
          NORMALIZED_KEY="${RAW_UPDATER_KEY//\\n/$'\n'}"

          # Support keys stored as base64 (tauri signer generate output format).
          if ! printf '%s\n' "$NORMALIZED_KEY" | grep -q '^untrusted comment:'; then
            DECODED_KEY=""
            if DECODED_KEY="$(printf '%s' "$NORMALIZED_KEY" | base64 --decode 2>/dev/null)"; then
              :
            elif DECODED_KEY="$(printf '%s' "$NORMALIZED_KEY" | base64 -d 2>/dev/null)"; then
              :
            elif DECODED_KEY="$(printf '%s' "$NORMALIZED_KEY" | base64 -D 2>/dev/null)"; then
              :
            else
              DECODED_KEY=""
            fi

            if printf '%s\n' "$DECODED_KEY" | grep -q '^untrusted comment:'; then
              NORMALIZED_KEY="$DECODED_KEY"
            fi
          fi

          if ! printf '%s\n' "$NORMALIZED_KEY" | grep -q '^untrusted comment:'; then
            echo "TAURI_SIGNING_PRIVATE_KEY format is invalid (missing minisign comment header)."
            exit 1
          fi

          # Trim CR from password to avoid accidental Windows line endings in secrets.
          NORMALIZED_PASSWORD="${RAW_UPDATER_PASSWORD//$'\r'/}"

          {
            echo "TAURI_SIGNING_PRIVATE_KEY<<EOF"
            printf '%s\n' "$NORMALIZED_KEY"
            echo "EOF"
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=$NORMALIZED_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Build And Publish Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Lingo v__VERSION__'
          releaseBody: |
            更新日志：
            1. 修复自动更新发布链路缺少 latest.json 和签名文件，解决客户端“检查更新”报错问题。
            2. 补齐 Tauri updater 产物上传配置，后续版本可正常检测、下载并安装更新。
            3. 优化更新页错误提示，发布资源缺失时会直接提示缺少 updater artifacts。

            安装包：
            - Windows: `.msi` / `.exe`
            - macOS: `.dmg`
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
