name: Build Installers

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: '--bundles msi,nsis'
            label: Windows
          - os: macos-latest
            args: '--bundles app,dmg'
            label: macOS

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Dependencies
        run: npm ci

      - name: Install WiX Toolset (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install wixtoolset -y --no-progress
          choco install nsis -y --no-progress
          $wix = Get-ChildItem 'C:\Program Files (x86)' -Directory | Where-Object { $_.Name -like 'WiX Toolset*' } | Select-Object -First 1
          if ($null -eq $wix) {
            throw "WiX Toolset installation not found."
          }
          "$($wix.FullName)\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          candle.exe -?

      - name: Build And Publish Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'Lingo v__VERSION__'
          releaseBody: |
            更新日志：
            1. 更新 Lingo 应用图标与品牌视觉，统一侧栏、前端资源和安装包图标。
            2. 强化“游戏 + 翻译”视觉语义，并将整体风格收束到更冷静的科技感。
            3. 保持现有自动更新、安装包分发与多平台构建流程不变。

            安装包：
            - Windows: `.msi` / `.exe`
            - macOS: `.dmg`
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
